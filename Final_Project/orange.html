<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orange Dark Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="dashboard-container">
    
    <aside class="sidebar">
      
      <div class="user-profile">
        <img src="./images/Soibi-Bobo.png" alt="Soibi-Bobo" class="profile-img">
        <span class="profile-name">Soibi-Bobo</span>
      </div>

      <nav class="sidebar-nav">
        <ul class="nav-list">
          
          <li class="nav-item active">
            <a href="#" class="nav-link">
              <img src="./images/Home.svg" alt="Home" class="nav-icon">
              <span>Home</span>
            </a>
          </li>

          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Budget.svg" alt="Budget" class="nav-icon">
              <span>Budget</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Transactions.svg" alt="Transactions" class="nav-icon">
              <span>Transactions</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Subscriptions.svg" alt="Subscriptions" class="nav-icon">
              <span>Subscriptions</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Loans.svg" alt="Loans" class="nav-icon">
              <span>Loans</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Reports.svg" alt="Reports" class="nav-icon">
              <span>Reports</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Savings.svg" alt="Savings" class="nav-icon">
              <span>Savings</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Financial advice.svg" alt="Financial advice" class="nav-icon">
              <span>Financial advice</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Account.svg" alt="Account" class="nav-icon">
              <span>Account</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a href="#" class="nav-link">
              <img src="./images/Settings.svg" alt="Settings" class="nav-icon">
              <span>Settings</span>
            </a>
          </li>

        </ul>
      </nav>
      
    </aside>

    <main class="main-content">
      
      <header class="header">
        <h1 class="page-title">Home</h1>
        
        <div class="header-actions">
          <button class="icon-btn">
            <img src="./images/glass.svg" alt="Search">
          </button>
          
          <button class="icon-btn">
            <img src="./images/bell.svg" alt="Notifications">
            <span class="notification-dot"></span> </button>
        </div>
      </header>

      <div class="cards-grid">
        
      </div>

    </main>

  </div>

</body>
</html>
